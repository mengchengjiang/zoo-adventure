<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>若熙的飞禽探险手册</title>
<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;background:linear-gradient(180deg,#e0f2f1 0%,#b2dfdb 50%,#80cbc4 100%);min-height:100vh;padding-bottom:60px}
.hd{background:linear-gradient(135deg,#00695c,#00897b);color:#fff;padding:20px 16px 16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.hd h1{font-size:22px;margin-bottom:4px}
.hd .sub{font-size:13px;opacity:.9}
.prog{margin-top:10px;background:rgba(255,255,255,.2);border-radius:16px;padding:6px 12px}
.prog-text{font-size:13px;font-weight:700}
.prog-bg{background:rgba(255,255,255,.3);border-radius:10px;height:18px;overflow:hidden;margin-top:4px}
.prog-fill{background:linear-gradient(90deg,#ffeb3b,#ff9800);height:100%;border-radius:10px;transition:width .6s;min-width:20px}
.badges{display:flex;justify-content:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.15);opacity:.4;transition:all .3s}
.badge.on{opacity:1;background:rgba(255,255,255,.35)}
.zt{font-size:17px;font-weight:700;color:#00695c;padding:14px 14px 6px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 10px 10px}
@media(min-width:768px){.grid{grid-template-columns:repeat(3,1fr)}}
.card{background:#fff;border-radius:16px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;box-shadow:0 3px 10px rgba(0,0,0,.1);border:3px solid #e0e0e0;cursor:pointer;transition:transform .2s,border-color .3s,background .5s;-webkit-user-select:none;user-select:none;position:relative}
.card:active{transform:scale(0.95)}
.card.found{border-color:#ffc107;background:linear-gradient(135deg,#fffde7,#fff9c4);box-shadow:0 4px 20px rgba(255,193,7,.3)}
.card .em{font-size:56px;margin-bottom:6px}
.card.found .em{animation:emB .6s ease}
@keyframes emB{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.card .nm{font-size:18px;font-weight:700;color:#333}
.card .en{font-size:10px;color:#999;margin-top:2px}
.card .tl{font-size:11px;color:#666;margin-top:4px;text-align:center}
.card .df{font-size:10px;margin-top:4px;color:#aaa}
.card .ht{font-size:10px;color:#bbb;margin-top:6px;animation:pu 2s infinite}
@keyframes pu{0%,100%{opacity:.4}50%{opacity:1}}
.card .stamp{position:absolute;top:8px;right:8px;font-size:24px;display:none}
.card.found .stamp{display:block}
.card .pht{position:absolute;bottom:18px;right:6px;width:28px;height:28px;border-radius:6px;object-fit:cover;border:2px solid #009688;display:none}
.card .ft{position:absolute;bottom:4px;font-size:9px;color:#e65100;font-weight:700;display:none}
.card.found .ft{display:block}

.detail-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:200;justify-content:center;align-items:flex-start;padding:20px 12px;overflow-y:auto}
.detail-overlay.show{display:flex}
.detail-panel{background:#fff;border-radius:20px;width:100%;max-width:420px;overflow:hidden;animation:panelIn .35s ease;margin:auto}
@keyframes panelIn{0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}
.detail-panel .close-btn{position:absolute;top:12px;right:12px;width:36px;height:36px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;font-size:20px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center}
.detail-panel .photo-section{position:relative;width:100%;overflow:hidden;background:#f0f0f0}
.detail-panel .photo-section img{width:100%;height:auto;display:block}
.detail-panel .photo-section .em-badge{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:48px;background:#fff;border-radius:50%;width:56px;height:56px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.detail-panel .info{padding:30px 16px 12px;text-align:center}
.detail-panel .info h2{font-size:22px;color:#333;margin-bottom:2px}
.detail-panel .info .en{font-size:12px;color:#999}
.detail-panel .info .sz{font-size:12px;color:#8d6e63;margin-top:6px;font-weight:600}
.detail-panel .info .tag{font-size:13px;color:#555;margin-top:6px;font-style:italic}
.detail-panel .section{padding:0 16px 12px;text-align:left}
.detail-panel .section-title{font-size:14px;font-weight:700;color:#00695c;margin-bottom:6px}
.detail-panel .facts{list-style:none;padding:0;font-size:13px;color:#555;line-height:1.6}
.detail-panel .facts li{margin-bottom:4px}
.detail-panel .facts li::before{content:"🌟 "}
.detail-panel .quiz-box{background:#fff8e1;border-radius:12px;padding:12px;margin:0 16px 12px;font-size:13px}
.detail-panel .quiz-box .ql{font-weight:700;color:#f57f17;margin-bottom:4px}
.detail-panel .loc{font-size:12px;color:#888;padding:0 16px 12px}
.detail-panel .btns{display:flex;gap:6px;padding:0 16px 8px;flex-wrap:wrap}
.detail-panel .btns:last-child{padding-bottom:16px}
.bt{flex:1;padding:12px 8px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;min-height:44px;min-width:70px;-webkit-user-select:none;user-select:none}
.bt-v{background:#ff5252;color:#fff}.bt-p{background:#2196f3;color:#fff}.bt-f{background:#009688;color:#fff}.bt-f.done{background:#bbb}.bt-s{background:#ff9800;color:#fff}.bt-m{background:#7e57c2;color:#fff}
.mo{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:300;justify-content:center;align-items:center}
.mo.show{display:flex}
.mo-c{background:#fff;border-radius:20px;padding:24px;width:90%;max-width:360px;text-align:center}
.mo-c h2{font-size:22px;margin-bottom:10px}
.mo-c p{font-size:15px;color:#555;margin-bottom:14px}
.mo-c button{background:#009688;color:#fff;border:none;padding:10px 28px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.rst{display:block;margin:16px auto;background:none;border:1px solid #ccc;color:#999;padding:6px 16px;border-radius:8px;font-size:11px;cursor:pointer}
input[type=file]{display:none}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
.emoji-rain{position:absolute;font-size:28px;opacity:0;pointer-events:none}
@keyframes erain{0%{transform:translateY(-30px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(360deg);opacity:.3}}

</style>
</head>

{id:'greyparrot',zone:'Heart of Africa ❤️',emoji:'🦜',name:'非洲灰鹦鹉',en:'African Grey Parrot',tag:'我的智力跟4岁小朋友一样！',diff:2,sndKey:'greyparrot',img:IMG_BP+'/grey-parrot/grey-africa-aem-properties-1x1.jpg',size:'🦜 = 33厘米长，灰色身体红色尾巴',facts:['最聪明的鹦鹉！一只叫Alex的会说100多个英语单词做加法','智力相当于4岁小朋友，和若熙一样大！','可以发出200多种不同的声音，模仿别的鸟叫','过去40年超过130万只被抓去当宠物','🍽 吃水果、种子和花 | ⏳ 最长40年 | 🌍 非洲森林 | ⚠️ 濒危'],quiz:'非洲灰鹦鹉的聪明程度和几岁小朋友一样？',ans:'4岁！和若熙一样聪明，会说话会数数会模仿声音',loc:'Heart of Africa 区',map:'https://www.mandai.com/en/bird-paradise/animals-and-zones/heart-of-africa/african-grey-parrot.html',vidQ:'非洲灰鹦鹉+儿童+中文'},
{id:'balimyna',zone:'Songs of the Forest 🎵',emoji:'🕊',name:'巴厘八哥',en:'Bali Myna',tag:'我差点灭绝了！',diff:3,hidden:1,sndKey:'balimyna',img:IMG_BP+'/bali-myna/bali-myna-aem-properties-1x1.jpg',size:'🕊 = 25厘米长，全身雪白色',facts:['全身雪白，眼睛周围有蓝色面具像戴了蓝色眼影！','差点灭绝！2001年野外只剩6只','喜欢互相梳理羽毛，像好朋友帮你梳头发','全世界只有巴厘岛才有这种鸟','🍽 吃昆虫、水果和小蜥蜴 | ⏳ 最长25年 | 🌍 印尼巴厘岛 | ⚠️ 极危'],quiz:'巴厘八哥眼睛周围是什么颜色？',ans:'蓝色的！像戴了一副蓝色小面具，很漂亮！',loc:'Songs of the Forest 区',map:'https://www.mandai.com/en/bird-paradise/animals-and-zones/songs-of-the-forest/bali-myna.html',vidQ:'巴厘八哥+儿童+中文'},

function playAnimal(e,key){if(e)e.stopPropagation();try{if(typeof SOUNDS!=='undefined'&&SOUNDS[key]){var a=new Audio(SOUNDS[key]);a.volume=.8;a.play().catch(function(){});}}catch(ex){}}
function render(){var html='',cz='';A.forEach(function(a){if(a.zone!==cz){if(cz)html+='</div>';cz=a.zone;html+='<div class="zt">'+a.zone+'</div><div class="grid">';}var isF=!!S.f[a.id],hasP=!!S.p[a.id];var ds='⭐'.repeat(a.diff)+(a.hidden?' 🔍隐藏款':'');var ft=isF?new Date(S.f[a.id]):'';var ftStr=ft?'若熙在 '+ft.getHours()+':'+('0'+ft.getMinutes()).slice(-2)+' 找到了！':'';html+='<div class="card'+(isF?' found':'')+'" onclick="openDetail(\''+a.id+'\')">';html+='<div class="stamp">⭐</div><div class="em">'+a.emoji+'</div><div class="nm">'+a.name+'</div><div class="en">'+a.en+'</div><div class="tl">'+a.tag+'</div><div class="df">'+ds+'</div>';if(!isF)html+='<div class="ht">👆 点我看介绍</div>';html+='<div class="ft">'+ftStr+'</div>';if(hasP)html+='<img class="pht" src="'+S.p[a.id]+'" style="display:block">';html+='</div>';});html+='</div>';document.getElementById('cards').innerHTML=html;upProg();}
function openDetail(id){var a=A.find(function(x){return x.id===id});if(!a)return;playAnimal(null,a.sndKey);var isF=!!S.f[a.id];var h='<div class="detail-panel" onclick="event.stopPropagation()"><div class="photo-section"><img src="'+a.img+'" alt="'+a.name+'" onerror="this.style.display=\'none\'"><button class="close-btn" onclick="closeDetail()">&times;</button><div class="em-badge">'+a.emoji+'</div></div><div class="info"><h2>'+a.name+'</h2><div class="en">'+a.en+'</div><div class="tag">"'+a.tag+'"</div><div class="sz">'+a.size+'</div></div><div class="section"><div class="section-title">🌟 趣味知识</div><ul class="facts">';a.facts.forEach(function(f){h+='<li>'+f+'</li>'});h+='</ul></div><div class="quiz-box"><div class="ql">🧠 考考若熙：</div>'+a.quiz+'<br><details onclick="event.stopPropagation()"><summary style="cursor:pointer;color:#f57f17;font-size:12px;margin-top:6px">👀 点击看答案</summary><div style="margin-top:6px;color:#555;font-size:13px;font-weight:700">'+a.ans+'</div></details></div><div class="loc">📍 '+a.loc+'</div><div class="btns"><button class="bt bt-s" onclick="playAnimal(event,\''+a.sndKey+'\')">🔊 叫声</button><button class="bt bt-m" onclick="window.open(\''+a.map+'\',\'_blank\')">🗺 地图</button></div><div class="btns"><button class="bt bt-p" onclick="takePhoto(\''+a.id+'\')">📷 拍照</button><button class="bt bt-f'+(isF?' done':'')+'" onclick="markFound(\''+a.id+'\')">'+( isF?'⭐ 已找到':'👀 找到了！')+'</button></div></div>';document.getElementById('detail').innerHTML=h;document.getElementById('detail').classList.add('show');document.body.style.overflow='hidden';}
function closeDetail(e){if(e&&e.target!==document.getElementById('detail')&&!e.target.classList.contains('close-btn'))return;document.getElementById('detail').classList.remove('show');document.body.style.overflow='';}
function markFound(id){if(S.f[id])return;S.f[id]=Date.now();sv();playFound();closeDetail();var emoji=A.find(function(x){return x.id===id}).emoji;setTimeout(function(){render();emojiRain(emoji);checkA()},300);}
var curP=null;function takePhoto(id){curP=id;document.getElementById('cam').click()}
document.getElementById('cam').addEventListener('change',function(e){var file=e.target.files[0];if(!file||!curP)return;var r=new FileReader();r.onload=function(ev){var img=new Image();img.onload=function(){var c=document.createElement('canvas');c.width=200;c.height=200;var ctx=c.getContext('2d');var m=Math.min(img.width,img.height);ctx.drawImage(img,(img.width-m)/2,(img.height-m)/2,m,m,0,0,200,200);S.p[curP]=c.toDataURL('image/jpeg',.6);sv();render()};img.src=ev.target.result};r.readAsDataURL(file);e.target.value=''});
function upProg(){var n=Object.keys(S.f).length;document.getElementById('fc').textContent=n;document.getElementById('pf').style.width=Math.round(n/15*100)+'%';document.getElementById('b1').className='badge'+(n>=5?' on':'');document.getElementById('b2').className='badge'+(n>=10?' on':'');document.getElementById('b3').className='badge'+(n>=15?' on':'');var hf=hidden.every(function(h){return S.f[h]});document.getElementById('b4').className='badge'+(hf?' on':'');}
function emojiRain(emoji){var c=document.getElementById('cc');for(var i=0;i<50;i++){var el=document.createElement('div');el.className='emoji-rain';el.textContent=emoji;el.style.left=Math.random()*100+'%';el.style.top='-30px';el.style.fontSize=(Math.random()*20+20)+'px';el.style.animation='erain '+(Math.random()*2+1.5)+'s ease-out forwards';el.style.animationDelay=Math.random()*.8+'s';c.appendChild(el);setTimeout(function(e){e.remove()}.bind(null,el),4000);}}
function checkA(){var n=Object.keys(S.f).length;if(n===5)showA('🥉 小小观鸟家！','若熙已经找到5种鸟啦！继续加油！');else if(n===10)showA('🥈 飞禽达人！','哇！若熙找到10种鸟了！还有5种等你发现！');else if(n===15)showA('🥇🎉 鸟类大师！！！','若熙太厉害了！15种鸟全部找到！你是最棒的小鸟类学家！');}
function showA(t,x){document.getElementById('mt').textContent=t;document.getElementById('mx').textContent=x;document.getElementById('modal').classList.add('show')}
function resetAll(){if(confirm('确定要重新开始吗？')){S={f:{},p:{}};sv();render()}}
try{render()}catch(e){document.getElementById('cards').innerHTML='<p style="padding:20px;color:red">加载出错：'+e.message+'</p>';console.error(e);}
