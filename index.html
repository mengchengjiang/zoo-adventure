<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>若熙的动物探险手册</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;background:linear-gradient(180deg,#e8f5e9 0%,#c8e6c9 50%,#a5d6a7 100%);min-height:100vh;padding-bottom:60px}
.hd{background:linear-gradient(135deg,#2e7d32,#43a047);color:#fff;padding:20px 16px 16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.hd h1{font-size:22px;margin-bottom:4px}
.hd .sub{font-size:13px;opacity:.9}
.prog{margin-top:10px;background:rgba(255,255,255,.2);border-radius:16px;padding:6px 12px}
.prog-text{font-size:13px;font-weight:700}
.prog-bg{background:rgba(255,255,255,.3);border-radius:10px;height:18px;overflow:hidden;margin-top:4px}
.prog-fill{background:linear-gradient(90deg,#ffeb3b,#ff9800);height:100%;border-radius:10px;transition:width .6s;min-width:20px}
.badges{display:flex;justify-content:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.15);opacity:.4;transition:all .3s}
.badge.on{opacity:1;background:rgba(255,255,255,.35)}
.zt{font-size:17px;font-weight:700;color:#2e7d32;padding:14px 14px 6px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 10px 10px}
@media(min-width:768px){.grid{grid-template-columns:repeat(3,1fr)}}
.card{background:#fff;border-radius:16px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;box-shadow:0 3px 10px rgba(0,0,0,.1);border:3px solid #e0e0e0;cursor:pointer;transition:transform .2s,border-color .3s,background .5s;-webkit-user-select:none;user-select:none;position:relative}
.card:active{transform:scale(0.95)}
.card.found{border-color:#ffc107;background:linear-gradient(135deg,#fffde7,#fff9c4);box-shadow:0 4px 20px rgba(255,193,7,.3)}
.card .em{font-size:56px;margin-bottom:6px}
.card.found .em{animation:emB .6s ease}
@keyframes emB{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.card .nm{font-size:18px;font-weight:700;color:#333}
.card .en{font-size:10px;color:#999;margin-top:2px}
.card .tl{font-size:11px;color:#666;margin-top:4px;text-align:center}
.card .df{font-size:10px;margin-top:4px;color:#aaa}
.card .ht{font-size:10px;color:#bbb;margin-top:6px;animation:pu 2s infinite}
@keyframes pu{0%,100%{opacity:.4}50%{opacity:1}}
.card .stamp{position:absolute;top:8px;right:8px;font-size:24px;display:none}
.card.found .stamp{display:block}
.card .ft{position:absolute;bottom:4px;font-size:9px;color:#e65100;font-weight:700;display:none}
.card.found .ft{display:block}

.detail-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:200;justify-content:center;align-items:flex-start;padding:20px 12px;overflow-y:auto}
.detail-overlay.show{display:flex}
.detail-panel{background:#fff;border-radius:20px;width:100%;max-width:420px;overflow:hidden;animation:panelIn .35s ease;margin:auto}
@keyframes panelIn{0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}
.detail-panel .close-btn{position:absolute;top:12px;right:12px;width:36px;height:36px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;font-size:20px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center}
.detail-panel .photo-section{position:relative;width:100%;overflow:hidden;background:#f0f0f0}
.detail-panel .photo-section img{width:100%;height:auto;display:block}
.detail-panel .photo-section .em-badge{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:48px;background:#fff;border-radius:50%;width:56px;height:56px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.detail-panel .info{padding:30px 16px 12px;text-align:center}
.detail-panel .info h2{font-size:22px;color:#333;margin-bottom:2px}
.detail-panel .info .en{font-size:12px;color:#999}
.detail-panel .info .sz{font-size:12px;color:#8d6e63;margin-top:6px;font-weight:600}
.detail-panel .info .tag{font-size:13px;color:#555;margin-top:6px;font-style:italic}
.detail-panel .section{padding:0 16px 12px;text-align:left}
.detail-panel .section-title{font-size:14px;font-weight:700;color:#2e7d32;margin-bottom:6px}
.detail-panel .facts{list-style:none;padding:0;font-size:13px;color:#555;line-height:1.6}
.detail-panel .facts li{margin-bottom:4px}
.detail-panel .facts li::before{content:"🌟 "}
.detail-panel .quiz-box{background:#fff8e1;border-radius:12px;padding:12px;margin:0 16px 12px;font-size:13px}
.detail-panel .quiz-box .ql{font-weight:700;color:#f57f17;margin-bottom:4px}
.detail-panel .loc{font-size:12px;color:#888;padding:0 16px 12px}
.detail-panel .btns{display:flex;gap:6px;padding:0 16px 8px;flex-wrap:wrap}
.detail-panel .btns:last-child{padding-bottom:16px}
.bt{flex:1;padding:12px 8px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;min-height:44px;min-width:70px;-webkit-user-select:none;user-select:none}
.bt-v{background:#ff5252;color:#fff}.bt-p{background:#2196f3;color:#fff}.bt-f{background:#4caf50;color:#fff}.bt-f.done{background:#bbb}.bt-s{background:#ff9800;color:#fff}.bt-m{background:#7e57c2;color:#fff}
.mo{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:300;justify-content:center;align-items:center}
.mo.show{display:flex}
.mo-c{background:#fff;border-radius:20px;padding:24px;width:90%;max-width:360px;text-align:center}
.mo-c h2{font-size:22px;margin-bottom:10px}
.mo-c p{font-size:15px;color:#555;margin-bottom:14px}
.mo-c button{background:#4caf50;color:#fff;border:none;padding:10px 28px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.rst{display:block;margin:16px auto;background:none;border:1px solid #ccc;color:#999;padding:6px 16px;border-radius:8px;font-size:11px;cursor:pointer}
input[type=file]{display:none}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
.emoji-rain{position:absolute;font-size:28px;opacity:0;pointer-events:none}
@keyframes erain{0%{transform:translateY(-30px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(360deg);opacity:.3}}
</style>
</head>
<body>
<div class="hd">
<h1>🦁 若熙的动物探险手册 🐘</h1>
<div class="sub">新加坡动物园 Singapore Zoo</div>
<div class="prog"><div class="prog-text">已发现: <span id="fc">0</span> / 15 只动物</div><div class="prog-bg"><div class="prog-fill" id="pf" style="width:0%"></div></div></div>
<div class="badges"><span class="badge" id="b1">🥉 小小探险家</span><span class="badge" id="b2">🥈 动物达人</span><span class="badge" id="b3">🥇 动物园大师</span><span class="badge" id="b4">🔍 火眼金睛</span></div>
</div>
<div id="cards"></div>
<button class="rst" onclick="resetAll()">🔄 重新开始探险</button>
<div class="confetti-container" id="cc"></div>
<div class="detail-overlay" id="detail" onclick="closeDetail(event)"></div>
<div class="mo" id="modal"><div class="mo-c"><h2 id="mt"></h2><p id="mx"></p><button onclick="document.getElementById('modal').classList.remove('show')">太棒了！</button></div></div>

<script>
var IMG="https://www.mandai.com/content/dam/wrs/singapore-zoo/animals/signpost/1x1";
var A=[
{id:'giraffe',zone:'Wild Africa 🌍',emoji:'🦒',name:'长颈鹿',en:'Giraffe',tag:'我的脖子比你还高！',diff:1,sndKey:'giraffe',img:IMG+'/giraffe-1X1.jpg',size:'🦒 = 3个爸爸叠起来那么高（5.5米）',facts:['舌头有53厘米长，像手一样灵活地抓树叶吃！','是世界上最高的动物，雄性将近6米高','低头喝水时身体有特殊血管防止血冲到脑袋','科学家研究它腿上的皮肤来帮飞行员设计衣服','🍽 吃树叶、花和水果 | ⏳ 寿命20-25年 | 🌍 非洲草原'],quiz:'长颈鹿为什么脖子这么长？',ans:'为了吃高高树上的叶子！',loc:'Wild Africa 区 | 🍼 喂食 10:45am/1:50pm/3:45pm ($8)',map:'https://www.mandai.com/en/singapore-zoo/animals-and-zones/giraffe.html',vidQ:'长颈鹿+儿童科普+动物'},
{id:'zebra',zone:'Wild Africa 🌍',emoji:'🦓',name:'斑马',en:'Zebra',tag:'我穿的是条纹睡衣！',diff:1,sndKey:'zebra',img:IMG+'/zebra-1X1.jpg',size:'🦓 = 跟爸爸差不多高（1.5米）',facts:['每只斑马的条纹都不一样，就像人的指纹！','皮肤其实是黑色的，条纹长在黑皮肤上面','条纹宽的斑马会得到更多朋友帮它理毛','吃掉老草让嫩草长出来，帮助其他动物','🍽 主要吃草 | ⏳ 最长26年 | 🌍 非洲肯尼亚 | ⚠️ 濒危：野外仅约3000只'],quiz:'斑马是白底黑条纹，还是黑底白条纹？',ans:'黑底白条纹！它们的皮肤是黑色的',loc:'Wild Africa 区 | 🍼 喂食 10:15am/2:15pm ($8)',map:'https://www.mandai.com/en/singapore-zoo/animals-and-zones/zebra.html',vidQ:'斑马+儿童+动物百科'},
{id:'lion',zone:'Wild Africa 🌍',emoji:'🦁',name:'狮子',en:'Lion',tag:'我是森林之王！吼～',diff:1,sndKey:'lion',img:IMG+'/lion-1X1.jpg',size:'🦁 = 4个若熙那么重（190公斤）',facts:['唯一住在大家庭里的大猫咪，叫狮群！','母狮才是主要猎手，一起合作围捕猎物','雄狮脖子的鬃毛越黑，母狮就越喜欢它','吼声传很远，告诉别的狮子这是我的地盘','🍽 吃斑马和角马 | ⏳ 母狮最多16年 | 🌍 非洲平原'],quiz:'狮子一天睡多少个小时？',ans:'20个小时！它们是大懒虫',loc:'Wild Africa 区',map:'https://www.mandai.com/en/singapore-zoo/animals-and-zones/lion.html',vidQ:'狮子+儿童科普+中文'},
{id:'cheetah',zone:'Wild Africa 🌍',emoji:'🐆',name:'猎豹',en:'Cheetah',tag:'我跑起来比汽车还快！',diff:2,sndKey:'cheetah',img:IMG+'/cheetah-1X1.jpg',size:'🐆 = 跑起来比爸爸开车还快（120km/h）',facts:['世界上跑最快的动物，最快每小时115公里！','但只能跑约20秒就要停下来休息','妈妈用啾啾的叫声叫小猎豹吃饭，像小鸟','亚洲猎豹几乎快灭绝，伊朗只剩约80只','🍽 吃瞪羚和野兔 | ⏳ 野外6-8年 | 🌍 非洲南部和东部'],quiz:'猎豹脸上的黑色条纹叫什么？',ans:'叫"泪痕"，像在流眼泪一样',loc:'Wild Africa 区',map:'https://www.mandai.com/en/singapore-zoo/animals-and-zones/cheetah.html',vidQ:'猎豹+儿童+速度最快的动物'},
{id:'tiger',zone:'Wild Africa 🌍',emoji:'🐅',name:'白老虎',en:'White Tiger',tag:'我有蓝色眼睛和白色的毛！',diff:2,sndKey:'tiger',img:IMG+'/white-tiger-1X1.jpg',size:'🐅 = 比爸爸重一倍多（120公斤），全球极稀有',facts:['白色不是生病！是特别的基因让毛变白、条纹变棕、眼睛变蓝','所有人工饲养的白老虎都来自一只叫Mohan的老虎','白色和橙色小老虎可以出现在同一窝里！','因为白色太显眼，野外很难偷偷接近猎物','🍽 吃鹿等大型动物 | ⏳ 可活20年 | 🌍 原产印度 | ⚠️ 野外极其罕见'],quiz:'白老虎为什么是白色的？',ans:'不是生病！是一个特别的基因让毛变白、眼睛变蓝色',loc:'Wild Africa 区',map:'https://www.mandai.com/en/singapore-zoo/animals-and-zones/malayan-tiger.html',vidQ:'马来亚虎+儿童+中文+老虎'},
{id:'hippo',zone:'Wild Africa 🌍',emoji:'🦛',name:'矮河马',en:'Pygmy Hippo',tag:'我是迷你版的河马！',diff:2,sndKey:'hippo',img:IMG+'/pygmy-hippo-1X1.jpg',size:'🦛 = 跟若熙差不多高，但比爸爸重3倍（270公斤）',facts:['皮肤会冒出粉红色液体，就像天然的防晒霜！','吃树枝像吃烤串一样，从底部拉过嘴巴','有时候会像人一样用后腿站起来够高处的食物','拉粑粑的时候会摇尾巴来标记自己的地盘','🍽 吃草、树叶和水果 | ⏳ 最长43年 | 🌍 西非低地森林 | ⚠️ 濒危'],quiz:'矮河马的皮肤为什么是粉红色的？',ans:'因为它们会分泌粉红色液体保护皮肤，像天然防晒霜！',loc:'Wild Africa 区 | 💬 Keeper Talk 2:30pm',map:'https://www.mandai.com/en/singapore-zoo/animals-and-zones/pygmy-hippo.html',vidQ:'矮河马+儿童+中文+可爱'},
{id:'painteddog',zone:'Wild Africa 🌍',emoji:'🐕',name:'非洲彩绘犬',en:'African Painted Dog',tag:'每只狗的花纹都不一样！',diff:2,sndKey:'dog',img:IMG+'/african-painted-dog-1X1.jpg',size:'🐕 = 跟大狗差不多大，有红黑棕白黄五种颜色',facts:['每只身上的花纹都不一样，像人的指纹！','住在大家庭里，会互相分享食物','有大大的耳朵，能听到很远的朋友在叫','一窝可以生2-20只小狗，全家一起照顾宝宝','🍽 吃羚羊和角马 | ⏳ 最多11年 | 🌍 东南非洲草原 | ⚠️ 易危'],quiz:'非洲彩绘犬身上有几种颜色？',ans:'五种！红色、黑色、棕色、白色和黄色，每只都不一样',loc:'Wild Africa 区',map:'https://www.mandai.com/en/singapore-zoo/animals-and-zones/african-painted-dog.html',vidQ:'非洲野犬+彩绘犬+儿童+中文'},
{id:'meerkat',zone:'Wild Africa 🌍',emoji:'🦡',name:'狐獴',en:'Meerkat',tag:'我是站岗放哨的小哨兵！',diff:1,sndKey:'meerkat',img:IMG+'/meerkat-1X1.jpg',size:'🦡 = 只有30厘米高，站起来像一根小棍子',facts:['家族里会派一只当哨兵，站得直直的看有没有危险','发现老鹰或蛇会发出不同的叫声告诉大家','眼睛周围的黑色圈圈像墨镜，防止太阳刺眼','《狮子王》里的丁满就是狐獴！','🍽 吃昆虫、蜥蜴和蝎子 | ⏳ 约12年 | 🌍 非洲南部沙漠'],quiz:'狐獴为什么总是站得直直的？',ans:'在站岗放哨！帮家族看有没有老鹰或蛇来了',loc:'Wild Africa 区附近',map:'https://www.mandai.com/en/singapore-zoo/animals-and-zones/animals-and-zones.html',vidQ:'狐獴+丁满+儿童+中文+狮子王'},
{id:'orangutan',zone:'Primate Kingdom 🐒',emoji:'🦧',name:'红毛猩猩',en:'Orangutan',tag:'我是动物园的大明星！',diff:1,hidden:1,sndKey:'orangutan',img:IMG+'/orangutan-1X1.jpg',size:'🦧 = 跟爸爸一样重（90公斤）',facts:['亚洲唯一的大猿，最大的住在树上的动物！','小猩猩跟妈妈一起生活7-8年学习生存技能','很喜欢吃榴莲，跟很多新加坡人一样！','记忆力超好，好几年后还能记住果树在哪里','🍽 吃山竹、红毛丹、荔枝 | ⏳ 最长60年 | 🌍 婆罗洲雨林 | ⚠️ 极危'],quiz:'"Orangutan"在马来语里是什么意思？',ans:'森林里的人！',loc:'Orangutan Island 明星区 | 💬 Keeper Talk 11:00am',map:'https://www.mandai.com/en/singapore-zoo/animals-and-zones/orangutan.html',vidQ:'红毛猩猩+儿童+科普+中文'},
{id:'monkey',zone:'Primate Kingdom 🐒',emoji:'🐵',name:'白面僧面猴',en:'White-faced Saki',tag:'我的脸像戴了面具！',diff:2,sndKey:'monkey',img:IMG+'/white-faced-saki-monkey-1X1.jpg',size:'🐵 = 只有2个若熙的水壶那么重（2公斤）',facts:['叫飞天猴，因为一跳可以跳将近10米远！','喝水方式特别：把手泡水里然后舔自己的手','睡觉像小猫一样蜷成一团趴在树枝上','花95%的吃饭时间在掰开种子来吃','🍽 吃种子、坚果和水果 | ⏳ 约15年 | 🌍 南美洲雨林'],quiz:'为什么叫"白面"僧面猴？',ans:'因为公猴的脸是白色的，像戴了面具！',loc:'Primate Kingdom 区',map:'https://www.mandai.com/en/singapore-zoo/animals-and-zones/white-faced-saki-monkey.html',vidQ:'僧面猴+灵长类+儿童+动物'},
{id:'lemur',zone:'Primate Kingdom 🐒',emoji:'🐒',name:'环尾狐猴',en:'Ring-tailed Lemur',tag:'我的尾巴有黑白条纹！',diff:1,sndKey:'lemur',img:IMG+'/ring-tailed-lemur-1x1.jpg',size:'🐒 = 跟若熙的书包差不多重（2.5公斤）',facts:['狐猴家庭是妈妈说了算，女生比男生地位高！','雄性打架把臭味涂在尾巴上互相甩，叫臭气大战','喜欢晒太阳，张开双手坐着像在做瑜伽','全世界只住在马达加斯加岛，其他地方都没有','🍽 吃水果和昆虫 | ⏳ 最长33年 | 🌍 马达加斯加 | ⚠️ 濒危'],quiz:'狐猴来自哪个岛？',ans:'马达加斯加！就是那个动画片里的地方',loc:'Primate Kingdom 区 | 🍼 狐猴喂食 2:15pm',map:'https://www.mandai.com/en/singapore-zoo/animals-and-zones/ring-tailed-lemur.html',vidQ:'环尾狐猴+马达加斯加+儿童'},
{id:'sunbear',zone:'Primate Kingdom 🐒',emoji:'🐻',name:'太阳熊',en:'Sun Bear',tag:'我胸口有一个金色太阳！',diff:2,sndKey:'bear',img:IMG+'/sun-bear-1X1.jpg',size:'🐻 = 世界上最小的熊，但在东南亚森林里最凶猛！',facts:['有一条超级长的舌头，能伸进缝隙里找蜂蜜和虫子','弯弯的爪子可以爬到很高的树上找吃的','胸口有一块金色或白色的月牙形斑纹','虽然是最小的熊，但在森林里谁都不怕','🍽 吃昆虫、蜂蜜和水果 | ⏳ 最长30年 | 🌍 东南亚热带雨林 | ⚠️ 易危'],quiz:'太阳熊最喜欢吃什么？',ans:'蜂蜜！它们用超长的舌头伸进蜂巢里舔蜂蜜',loc:'靠近 Primate Kingdom 区',map:'https://www.mandai.com/en/singapore-zoo/animals-and-zones/sun-bear.html',vidQ:'太阳熊+马来熊+儿童+中文'},

function playAnimal(e,key){if(e)e.stopPropagation();if(typeof SOUNDS!=='undefined'&&SOUNDS[key]){var a=new Audio(SOUNDS[key]);a.volume=.8;a.play().catch(function(){});}else if(SILENT_MSG[key]){alert(SILENT_MSG[key]);}}
function render(){var html='',cz='';A.forEach(function(a){if(a.zone!==cz){if(cz)html+='</div>';cz=a.zone;html+='<div class="zt">'+a.zone+'</div><div class="grid">';}var isF=!!S.f[a.id],hasP=!!S.p[a.id];var ds='⭐'.repeat(a.diff)+(a.hidden?' 🔍隐藏款':'');var ft=isF?new Date(S.f[a.id]):'';var ftStr=ft?'若熙在 '+ft.getHours()+':'+('0'+ft.getMinutes()).slice(-2)+' 找到了！':'';html+='<div class="card'+(isF?' found':'')+'" onclick="openDetail(\''+a.id+'\')">';html+='<div class="stamp">⭐</div><div class="em">'+a.emoji+'</div><div class="nm">'+a.name+'</div><div class="en">'+a.en+'</div><div class="tl">'+a.tag+'</div><div class="df">'+ds+'</div>';if(!isF)html+='<div class="ht">👆 点我看介绍</div>';html+='<div class="ft">'+ftStr+'</div>';if(hasP)html+='<img class="pht" src="'+S.p[a.id]+'" style="display:block">';html+='</div>';});html+='</div>';document.getElementById('cards').innerHTML=html;upProg();}
function openDetail(id){var a=A.find(function(x){return x.id===id});if(!a)return;var isF=!!S.f[a.id];var h='<div class="detail-panel" onclick="event.stopPropagation()"><div class="photo-section"><img src="'+a.img+'" alt="'+a.name+'" onerror="this.style.display=\'none\'"><button class="close-btn" onclick="closeDetail()">&times;</button><div class="em-badge">'+a.emoji+'</div></div><div class="info"><h2>'+a.name+'</h2><div class="en">'+a.en+'</div><div class="tag">"'+a.tag+'"</div><div class="sz">'+a.size+'</div></div><div class="section"><div class="section-title">🌟 趣味知识</div><ul class="facts">';a.facts.forEach(function(f){h+='<li>'+f+'</li>'});h+='</ul></div><div class="quiz-box"><div class="ql">🧠 考考若熙：</div>'+a.quiz+'<br><details onclick="event.stopPropagation()"><summary style="cursor:pointer;color:#f57f17;font-size:12px;margin-top:6px">👀 点击看答案</summary><div style="margin-top:6px;color:#555;font-size:13px;font-weight:700">'+a.ans+'</div></details></div><div class="loc">📍 '+a.loc+'</div><div class="btns"><button class="bt bt-s" onclick="playAnimal(event,\''+a.sndKey+'\')">🔊 叫声</button><button class="bt bt-m" onclick="window.open(\''+a.map+'\',\'_blank\')">🗺 地图</button><button class="bt bt-v" onclick="window.open(\'https://www.youtube.com/results?search_query='+encodeURIComponent(a.vidQ)+'\',\'_blank\')">▶ 视频</button></div><div class="btns"><button class="bt bt-p" onclick="takePhoto(\''+a.id+'\')">📷 拍照</button><button class="bt bt-f'+(isF?' done':'')+'" onclick="markFound(\''+a.id+'\')">'+(isF?'⭐ 已找到':'👀 找到了！')+'</button></div></div>';document.getElementById('detail').innerHTML=h;document.getElementById('detail').classList.add('show');document.body.style.overflow='hidden';}
function closeDetail(e){if(e&&e.target!==document.getElementById('detail')&&!e.target.classList.contains('close-btn'))return;document.getElementById('detail').classList.remove('show');document.body.style.overflow='';}
function markFound(id){if(S.f[id])return;S.f[id]=Date.now();sv();playFound();closeDetail();var emoji=A.find(function(x){return x.id===id}).emoji;setTimeout(function(){render();emojiRain(emoji);checkA()},300);}
var curP=null;function takePhoto(id){curP=id;document.getElementById('cam').click()}
document.getElementById('cam').addEventListener('change',function(e){var file=e.target.files[0];if(!file||!curP)return;var r=new FileReader();r.onload=function(ev){var img=new Image();img.onload=function(){var c=document.createElement('canvas');c.width=200;c.height=200;var ctx=c.getContext('2d');var m=Math.min(img.width,img.height);ctx.drawImage(img,(img.width-m)/2,(img.height-m)/2,m,m,0,0,200,200);S.p[curP]=c.toDataURL('image/jpeg',.6);sv();render()};img.src=ev.target.result};r.readAsDataURL(file);e.target.value=''});
function upProg(){var n=Object.keys(S.f).length;document.getElementById('fc').textContent=n;document.getElementById('pf').style.width=Math.round(n/15*100)+'%';document.getElementById('b1').className='badge'+(n>=5?' on':'');document.getElementById('b2').className='badge'+(n>=10?' on':'');document.getElementById('b3').className='badge'+(n>=15?' on':'');var hf=['orangutan','mousedeer'].every(function(h){return S.f[h]});document.getElementById('b4').className='badge'+(hf?' on':'');}
function emojiRain(emoji){var c=document.getElementById('cc');for(var i=0;i<50;i++){var el=document.createElement('div');el.className='emoji-rain';el.textContent=emoji;el.style.left=Math.random()*100+'%';el.style.top='-30px';el.style.fontSize=(Math.random()*20+20)+'px';el.style.animation='erain '+(Math.random()*2+1.5)+'s ease-out forwards';el.style.animationDelay=Math.random()*.8+'s';c.appendChild(el);setTimeout(function(e){e.remove()}.bind(null,el),4000);}}
function checkA(){var n=Object.keys(S.f).length;if(n===5)showA('🥉 小小探险家！','若熙已经找到5只动物啦！继续加油！');else if(n===10)showA('🥈 动物达人！','哇！若熙找到10只动物了！还有5只等你发现！');else if(n===15)showA('🥇🎉 动物园大师！！！','若熙太厉害了！15只动物全部找到！你是最棒的小探险家！');}
function showA(t,x){document.getElementById('mt').textContent=t;document.getElementById('mx').textContent=x;document.getElementById('modal').classList.add('show')}
function resetAll(){if(confirm('确定要重新开始吗？')){S={f:{},p:{}};sv();render()}}
render();
</script>
</body>
