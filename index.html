<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>若熙的动物探险手册</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;background:linear-gradient(180deg,#e8f5e9 0%,#c8e6c9 50%,#a5d6a7 100%);min-height:100vh;padding-bottom:60px}
.hd{background:linear-gradient(135deg,#2e7d32,#43a047);color:#fff;padding:20px 16px 16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.hd h1{font-size:22px;margin-bottom:4px}
.hd .sub{font-size:13px;opacity:.9}
.prog{margin-top:10px;background:rgba(255,255,255,.2);border-radius:16px;padding:6px 12px}
.prog-text{font-size:13px;font-weight:700}
.prog-bg{background:rgba(255,255,255,.3);border-radius:10px;height:18px;overflow:hidden;margin-top:4px}
.prog-fill{background:linear-gradient(90deg,#ffeb3b,#ff9800);height:100%;border-radius:10px;transition:width .6s;min-width:20px}
.badges{display:flex;justify-content:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.15);opacity:.4;transition:all .3s}
.badge.on{opacity:1;background:rgba(255,255,255,.35)}
.zt{font-size:17px;font-weight:700;color:#2e7d32;padding:14px 14px 6px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 10px 10px}
@media(min-width:768px){.grid{grid-template-columns:repeat(3,1fr)}}
.cw{-webkit-perspective:800px;perspective:800px;height:360px;margin-bottom:0}
.cd{position:relative;width:100%;height:100%;-webkit-transition:-webkit-transform .6s;transition:transform .6s;-webkit-transform-style:preserve-3d;transform-style:preserve-3d;cursor:pointer;border-radius:16px}
.cd.flip{-webkit-transform:rotateY(180deg);transform:rotateY(180deg)}
.cf,.cb{position:absolute;top:0;left:0;width:100%;height:100%;-webkit-backface-visibility:hidden;backface-visibility:hidden;border-radius:16px}
.cf{background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;box-shadow:0 3px 10px rgba(0,0,0,.1);border:3px solid #e0e0e0;transition:border-color .3s,background .5s;overflow:hidden}
.cf.found{border-color:#ffc107;background:linear-gradient(135deg,#fffde7,#fff9c4,#fff176);box-shadow:0 4px 20px rgba(255,193,7,.4)}
.cf .photo-bg{width:100%;height:100px;border-radius:10px;overflow:hidden;margin-bottom:4px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;position:relative}
.cf .photo-bg img{width:100%;height:100%;object-fit:cover}
.cf .photo-bg .em-overlay{position:absolute;font-size:40px;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.cf.found .photo-bg{border:2px solid #ffc107}
.cf .nm{font-size:17px;font-weight:700;color:#333}
.cf .en{font-size:10px;color:#999;margin-top:1px}
.cf .tl{font-size:11px;color:#666;margin-top:3px;text-align:center}
.cf .sz{font-size:10px;color:#8d6e63;margin-top:2px;font-weight:600}
.cf .df{font-size:10px;margin-top:3px}
.cf .ht{font-size:10px;color:#aaa;margin-top:4px;animation:pu 2s infinite}
@keyframes pu{0%,100%{opacity:.4}50%{opacity:1}}
.cf .stamp{position:absolute;top:6px;right:6px;font-size:26px;display:none}
.cf.found .stamp{display:block;animation:stBounce .6s ease}
@keyframes stBounce{0%{transform:scale(0)}50%{transform:scale(1.5)}100%{transform:scale(1)}}
.cf .found-time{position:absolute;bottom:4px;left:0;width:100%;text-align:center;font-size:9px;color:#e65100;font-weight:700;display:none}
.cf.found .found-time{display:block}
.cf.found .em-overlay{animation:emBounce 1s ease}
@keyframes emBounce{0%{transform:scale(1)}25%{transform:scale(1.4)}50%{transform:scale(0.9)}75%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes goldShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.cf.found{animation:goldShimmer 3s ease-in-out infinite;background-size:200% 100%}
.cf .pht{position:absolute;bottom:20px;right:6px;width:30px;height:30px;border-radius:6px;object-fit:cover;border:2px solid #4caf50;display:none}
.cb{background:#fff;-webkit-transform:rotateY(180deg);transform:rotateY(180deg);padding:10px;display:flex;flex-direction:column;box-shadow:0 3px 10px rgba(0,0,0,.1);border:3px solid #2196f3;overflow-y:auto}
.cb h3{font-size:14px;color:#1565c0;margin-bottom:4px}
.cb .fs{font-size:11px;color:#555;line-height:1.5;margin-bottom:4px;list-style:none;padding:0}
.cb .fs li::before{content:"🌟 "}
.cb .fs li{margin-bottom:2px}
.cb .qz{background:#fff8e1;border-radius:8px;padding:6px;font-size:11px;margin-bottom:4px}
.cb .ql{font-weight:700;color:#f57f17}
.cb .loc{font-size:10px;color:#888;margin-bottom:4px}
.br{display:flex;gap:4px;margin-top:auto;flex-wrap:wrap}
.bt{flex:1;padding:8px 4px;border:none;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:2px;min-height:38px;min-width:60px;-webkit-user-select:none;user-select:none}
.bt-v{background:#ff5252;color:#fff}
.bt-p{background:#2196f3;color:#fff}
.bt-f{background:#4caf50;color:#fff}
.bt-f.done{background:#aaa}
.bt-s{background:#ff9800;color:#fff}
.bt-m{background:#7e57c2;color:#fff}
.mo{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.mo.show{display:flex}
.mo-c{background:#fff;border-radius:20px;padding:24px;width:90%;max-width:360px;text-align:center}
.mo-c h2{font-size:22px;margin-bottom:10px}
.mo-c p{font-size:15px;color:#555;margin-bottom:14px}
.mo-c button{background:#4caf50;color:#fff;border:none;padding:10px 28px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.rst{display:block;margin:16px auto;background:none;border:1px solid #ccc;color:#999;padding:6px 16px;border-radius:8px;font-size:11px;cursor:pointer}
input[type=file]{display:none}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
.confetti{position:absolute;width:10px;height:10px;opacity:0}
@keyframes cfall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>

<div class="hd">
  <h1>🦁 若熙的动物探险手册 🐘</h1>
  <div class="sub">新加坡动物园 Singapore Zoo</div>
  <div class="prog">
    <div class="prog-text">已发现: <span id="fc">0</span> / 15 只动物</div>
    <div class="prog-bg"><div class="prog-fill" id="pf" style="width:0%"></div></div>
  </div>
  <div class="badges">
    <span class="badge" id="b1">🥉 小小探险家</span>
    <span class="badge" id="b2">🥈 动物达人</span>
    <span class="badge" id="b3">🥇 动物园大师</span>
    <span class="badge" id="b4">🔍 火眼金睛</span>
  </div>
</div>

<div id="cards"></div>

<button class="rst" onclick="resetAll()">🔄 重新开始探险</button>
<div class="confetti-container" id="cc"></div>
<div class="mo" id="modal"><div class="mo-c"><h2 id="mt"></h2><p id="mx"></p><button onclick="document.getElementById('modal').classList.remove('show')">太棒了！</button></div></div>
<input type="file" id="cam" accept="image/*" capture="environment">

    var ds='⭐'.repeat(a.diff)+(a.hidden?' 🔍隐藏款':'');
    var ft=isF?new Date(S.f[a.id]):'';
    var ftStr=ft?'若熙在 '+ft.getHours()+':'+('0'+ft.getMinutes()).slice(-2)+' 找到了'+a.name+'！':'';

    html+='<div class="cw"><div class="cd" id="c-'+a.id+'" onclick="flip(\''+a.id+'\')">'+
    '<div class="cf'+(isF?' found':'')+'" id="f-'+a.id+'">'+
      '<div class="stamp">⭐</div>'+
      '<div class="photo-bg"><img src="'+a.img+'" alt="'+a.name+'" onerror="this.style.display=\'none\'"><div class="em-overlay">'+a.emoji+'</div></div>'+
      '<div class="nm">'+a.name+'</div><div class="en">'+a.en+'</div>'+
      '<div class="tl">'+a.tag+'</div>'+
      '<div class="sz">'+a.size+'</div>'+
      '<div class="df">'+ds+'</div>'+
      (isF?'':'<div class="ht">👆 点我看介绍</div>')+
      '<div class="found-time">'+ftStr+'</div>'+
      (hasP?'<img class="pht" src="'+S.p[a.id]+'" style="display:block">':'<img class="pht" id="ph-'+a.id+'">')+
    '</div>'+
    '<div class="cb">'+
      '<h3>'+a.emoji+' '+a.name+' <span style="font-size:11px;color:#999">'+a.en+'</span></h3>'+
      '<ul class="fs">'+a.facts.map(function(f){return '<li>'+f+'</li>'}).join('')+'</ul>'+
      '<div class="qz"><div class="ql">🧠 考考若熙：</div>'+a.quiz+'<br>'+
        '<details onclick="event.stopPropagation()"><summary style="cursor:pointer;color:#f57f17;font-size:11px;margin-top:4px">点击看答案</summary>'+
        '<div style="margin-top:4px;color:#555;font-size:12px">'+a.ans+'</div></details></div>'+
      '<div class="loc">📍 '+a.loc+'</div>'+
      '<div class="br">'+
        '<button class="bt bt-s" onclick="playAnimal(event,\''+a.sndKey+'\')">🔊 叫声</button>'+
        '<button class="bt bt-m" onclick="openMap(event,\''+a.map+'\')">🗺 地图</button>'+
        '<button class="bt bt-v" onclick="vid(event,\''+a.vidQ+'\')">▶ 视频</button>'+
      '</div>'+
      '<div class="br" style="margin-top:4px">'+
        '<button class="bt bt-p" onclick="photo(event,\''+a.id+'\')">📷 拍照</button>'+
        '<button class="bt bt-f'+(isF?' done':'')+'" id="bf-'+a.id+'" onclick="found(event,\''+a.id+'\')">'+
          (isF?'⭐ 已找到':'👀 找到了！')+'</button>'+
      '</div>'+
    '</div>'+
    '</div></div>';
  });
  html+='</div>';
  document.getElementById('cards').innerHTML=html;
  upProg();
}

function flip(id){var c=document.getElementById('c-'+id);if(c)c.classList.toggle('flip')}

function found(e,id){
  e.stopPropagation();
  if(S.f[id])return;
  S.f[id]=Date.now();sv();
  playFound();
  var c=document.getElementById('c-'+id);if(c)c.classList.remove('flip');
  setTimeout(function(){render();confetti();checkA()},400);
}

function vid(e,q){e.stopPropagation();window.open('https://www.youtube.com/results?search_query='+encodeURIComponent(q),'_blank')}
function openMap(e,url){e.stopPropagation();window.open(url,'_blank')}

var curP=null;
function photo(e,id){e.stopPropagation();curP=id;document.getElementById('cam').click()}
document.getElementById('cam').addEventListener('change',function(e){
  var file=e.target.files[0];if(!file||!curP)return;
  var r=new FileReader();
  r.onload=function(ev){
    var img=new Image();img.onload=function(){
      var c=document.createElement('canvas');c.width=200;c.height=200;
      var ctx=c.getContext('2d');var m=Math.min(img.width,img.height);
      ctx.drawImage(img,(img.width-m)/2,(img.height-m)/2,m,m,0,0,200,200);
      S.p[curP]=c.toDataURL('image/jpeg',0.6);sv();render();
    };img.src=ev.target.result;
  };r.readAsDataURL(file);e.target.value='';
});

function upProg(){
  var n=Object.keys(S.f).length;
  document.getElementById('fc').textContent=n;
  document.getElementById('pf').style.width=Math.round(n/15*100)+'%';
  document.getElementById('b1').className='badge'+(n>=5?' on':'');
  document.getElementById('b2').className='badge'+(n>=10?' on':'');
  document.getElementById('b3').className='badge'+(n>=15?' on':'');
  var hf=hidden.every(function(h){return S.f[h]});
  document.getElementById('b4').className='badge'+(hf?' on':'');
}

function confetti(){
  var c=document.getElementById('cc');
  var cols=['#ff5252','#ffeb3b','#4caf50','#2196f3','#ff9800','#e040fb'];
  for(var i=0;i<40;i++){
    var el=document.createElement('div');el.className='confetti';
    el.style.left=Math.random()*100+'%';el.style.top='-10px';
    el.style.backgroundColor=cols[Math.floor(Math.random()*cols.length)];
    el.style.borderRadius=Math.random()>.5?'50%':'2px';
    el.style.width=(Math.random()*8+6)+'px';el.style.height=(Math.random()*8+6)+'px';
    el.style.animation='cfall '+(Math.random()*1.5+1)+'s ease-out forwards';
    el.style.animationDelay=Math.random()*0.5+'s';
    c.appendChild(el);setTimeout(function(e){e.remove()}.bind(null,el),3000);
  }
}

function checkA(){
  var n=Object.keys(S.f).length;
  if(n===5)showA('🥉 小小探险家！','若熙已经找到5只动物啦！继续加油！');
  else if(n===10)showA('🥈 动物达人！','哇！若熙找到10只动物了！还有5只等你发现！');
  else if(n===15)showA('🥇🎉 动物园大师！！！','若熙太厉害了！15只动物全部找到！\n你是最棒的小探险家！');
}
function showA(t,x){document.getElementById('mt').textContent=t;document.getElementById('mx').textContent=x;document.getElementById('modal').classList.add('show')}
function resetAll(){if(confirm('确定要重新开始吗？所有记录都会清除')){S={f:{},p:{}};sv();render()}}

render();
</script>
</body>
</html>
